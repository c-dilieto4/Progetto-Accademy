<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triage System - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-900: #0f2557;
            --blue-700: #1d4ed8;
            --blue-600: #2563eb;
            --blue-500: #3b82f6;
            --blue-100: #e8f0ff;
            --blue-50: #f4f8ff;
            --ink-900: #0f172a;
            --ink-600: #475569;
            --ink-400: #94a3b8;
            --line: #e3e9f2;
            --surface: #ffffff;
            --bg: #eef3fb;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --shadow-md: 0 4px 16px rgba(15, 37, 87, 0.08);
            --shadow-lg: 0 20px 50px rgba(15, 37, 87, 0.16);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(59,130,246,0.10), transparent 45%),
                radial-gradient(circle at 0% 100%, rgba(37,99,235,0.07), transparent 40%);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--ink-900);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--blue-500), var(--blue-900));
            box-shadow: 0 6px 18px rgba(37,99,235,0.35);
        }
        .brand-text {
            font-weight: 800;
            font-size: 1.25em;
            letter-spacing: -0.02em;
            color: var(--ink-900);
        }

        .login-container {
            background: var(--surface);
            border-radius: 18px;
            padding: 34px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--line);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            font-weight: 700;
            font-size: 1.2em;
            letter-spacing: -0.01em;
            border-bottom: 1px solid var(--line);
            padding-bottom: 14px;
            color: var(--ink-900);
            text-align: center;
            margin-top: 0;
            margin-bottom: 22px;
        }

        .input-row { position: relative; margin-top: 16px; margin-bottom: 4px; }
        .input-row i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-400);
            font-size: 0.9em;
        }
        .text {
            width: 100%;
            padding: 13px 14px 13px 42px;
            font-size: 0.95em;
            font-family: inherit;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            background: var(--blue-50);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .text:focus {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 4px var(--blue-100);
            background: var(--surface);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 0.97em;
            font-family: inherit;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-700));
            box-shadow: 0 4px 14px rgba(37,99,235,0.30);
            color: white;
            margin-top: 22px;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.40); }

        .submit-btn.green {
            background: linear-gradient(135deg, #16a34a, #15803d);
            box-shadow: 0 4px 14px rgba(22,163,74,0.30);
        }
        .submit-btn.green:hover { box-shadow: 0 8px 20px rgba(22,163,74,0.40); }

        .switch-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.92em;
            color: var(--ink-600);
        }
        .link-btn {
            background: none;
            border: none;
            color: var(--blue-600);
            font-weight: 700;
            cursor: pointer;
            padding: 0;
            font-size: 1em;
            font-family: inherit;
        }
        .link-btn:hover { color: var(--blue-700); }

        .alert-box {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 0.9em;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 500;
        }
        .alert-error { background: var(--red-bg); color: var(--red); border: 1px solid #fecaca; }
        .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

    <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">Triage Assistant</div>
    </div>

    <div class="login-container">
        
        <div id="signInSection">
            <h2>Effettua l'accesso</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert-box alert-{{ 'error' if category == 'error' else 'success' }}">
                            <i class="fa-solid {{ 'fa-triangle-exclamation' if category == 'error' else 'fa-circle-check' }}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form id="signInForm" method="POST" action="/login">
                <div class="input-row">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" id="login_username" class="text" placeholder="Username">
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" name="password" id="login_password" class="text" placeholder="Password">
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>
            
            <div class="switch-text">
                Nuovo utente? <button type="button" id="toSignUp" class="link-btn">Registrati</button>
            </div>
        </div>

        <div id="signUpSection" style="display: none;">
            <h2>Crea un account</h2>
            
            <form id="signUpForm" method="POST" action="/signup">
                <div class="input-row">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" name="nome" id="reg_nome" class="text" placeholder="Nome completo">
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" id="reg_email" class="text" placeholder="Email">
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" id="reg_username" class="text" placeholder="Username">
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" name="password" id="reg_password" class="text" placeholder="Password">
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-check-double"></i>
                    <input type="password" name="conferma_password" id="reg_conferma_password" class="text" placeholder="Conferma Password">
                </div>

                <button type="submit" class="submit-btn green">Registrati</button>
            </form>
            
            <div class="switch-text">
                Hai già un account? <button type="button" id="toSignIn" class="link-btn">Accedi</button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const signInSection = document.getElementById("signInSection");
            const signUpSection = document.getElementById("signUpSection");
            const toSignUp = document.getElementById("toSignUp");
            const toSignIn = document.getElementById("toSignIn");

            toSignUp.addEventListener("click", () => {
                signInSection.style.display = "none";
                signUpSection.style.display = "block";
            });
            toSignIn.addEventListener("click", () => {
                signUpSection.style.display = "none";
                signInSection.style.display = "block";
            });

            const signInForm = document.getElementById("signInForm");
            signInForm.addEventListener("submit", (event) => {
                const username = signInForm.querySelector("#login_username");
                const password = signInForm.querySelector("#login_password");

                if (username.value.trim() === "") {
                    alert("Devi inserire un username!");
                    username.focus();
                    event.preventDefault();
                    return;
                }
                if (password.value.trim() === "") {
                    alert("Devi inserire una password!");
                    password.focus();
                    event.preventDefault();
                    return;
                }
            });

            const signUpForm = document.getElementById("signUpForm");
            signUpForm.addEventListener("submit", (event) => {
                const nome = signUpForm.querySelector("#reg_nome");
                const email = signUpForm.querySelector("#reg_email");
                const username = signUpForm.querySelector("#reg_username");
                const password = signUpForm.querySelector("#reg_password");
                const conferma = signUpForm.querySelector("#reg_conferma_password");

                if (nome.value.trim() === "") {
                    alert("Devi inserire il tuo nome!");
                    nome.focus();
                    event.preventDefault();
                    return;
                }
                
                const emailRegex = /^[a-zA-Z0-9._-]+@[a-zA-Z0-9-]+\.[a-zA-Z]+$/;
                if (email.value.trim() === "" || !email.value.match(emailRegex)) {
                    alert("Devi inserire un'email valida!");
                    email.focus();
                    event.preventDefault();
                    return;
                }
                if (username.value.trim() === "") {
                    alert("Devi scegliere un username!");
                    username.focus();
                    event.preventDefault();
                    return;
                }
                if (password.value.trim() === "") {
                    alert("Devi scegliere una password!");
                    password.focus();
                    event.preventDefault();
                    return;
                }
                if (password.value.trim() !== conferma.value.trim()) {
                    alert("Le password non corrispondono!");
                    conferma.value = "";
                    conferma.focus();
                    event.preventDefault();
                    return;
                }
            });
        });
    </script>
</body>
</html>
